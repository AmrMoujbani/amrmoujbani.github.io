  <line x1="362" y1="62" x2="362" y2="560" stroke="#1E3A5F" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.6"/>
  <line x1="556" y1="62" x2="556" y2="560" stroke="#1E3A5F" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.6"/>
