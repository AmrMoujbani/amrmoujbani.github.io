  <text x="36" y="32" font-size="15" font-weight="600" fill="#F1F5F9" letter-spacing="0.3">Log Centralisation &amp; Monitoring Pipeline</text>
  <text x="36" y="48" font-size="10" fill="#64748B" letter-spacing="0.5">VERMEG Banking &amp; Insurance · Analyst Developer 2023–2024</text>

  <!-- Layer labels -->
  <text x="78" y="78" font-size="9" fill="#475569" font-weight="600" letter-spacing="1.5" text-anchor="middle">SOURCES</text>
  <text x="272" y="78" font-size="9" fill="#475569" font-weight="600" letter-spacing="1.5" text-anchor="middle">BEATS LAYER</text>
  <text x="466" y="78" font-size="9" fill="#475569" font-weight="600" letter-spacing="1.5" text-anchor="middle">PROCESS</text>
  <text x="660" y="78" font-size="9" fill="#475569" font-weight="600" letter-spacing="1.5" text-anchor="middle">INDEX &amp; STORE</text>
  <text x="854" y="78" font-size="9" fill="#475569" font-weight="600" letter-spacing="1.5" text-anchor="middle">VISUALISE</text>

